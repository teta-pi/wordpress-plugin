name: Plugin Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: PHP lint + WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: none

      - name: PHP lint (php -l on every file)
        run: |
          set -e
          for f in $(find . -name '*.php' -not -path './.git/*'); do
            php -l "$f"
          done

      - name: WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          plugin-repo: '.'
